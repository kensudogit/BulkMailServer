# Bulk Mail Server — Railway all-in-one
#
# Dashboard:
#   Root Directory  -> EMPTY
#   Dockerfile Path -> Dockerfile
#   Config file     -> /railway.toml
#
# Plugins: Postgres + Redis
# RabbitMQ: Docker Image service (rabbitmq:3-management-alpine) を追加し
#   RABBITMQ_URL=amqp://guest:guest@<rabbit-private-host>:5672

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1
