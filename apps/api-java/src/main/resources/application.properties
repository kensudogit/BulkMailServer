server.port=${JAVA_API_PORT:8090}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/bulkmail}
spring.datasource.username=${DB_USER:bms}
spring.datasource.password=${DB_PASSWORD:bms_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:bms}
spring.rabbitmq.password=${RABBITMQ_PASS:bms_secret}

bms.jwt-secret=${JWT_SECRET:change-me-bulk-mail-jwt-secret-32chars}
bms.queue-send=${RABBITMQ_QUEUE_SEND:mail.send}
bms.web-base-url=${WEB_BASE_URL:http://localhost:3000}
bms.api-base-url=${API_BASE_URL:http://localhost:8090}
bms.unsubscribe-secret=${UNSUBSCRIBE_TOKEN_SECRET:change-me-unsubscribe-secret}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
